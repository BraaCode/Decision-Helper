openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for قرار — decision making app
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: decisions
    description: Decision management
  - name: options
    description: Options within a decision
  - name: criteria
    description: Criteria for evaluating options
  - name: ratings
    description: Ratings of options against criteria

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /decisions:
    get:
      operationId: listDecisions
      tags: [decisions]
      summary: List all decisions for the authenticated user
      responses:
        "200":
          description: List of decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Decision"
        "401":
          description: Unauthorized
    post:
      operationId: createDecision
      tags: [decisions]
      summary: Create a new decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionInput"
      responses:
        "201":
          description: Created decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /decisions/{id}:
    get:
      operationId: getDecision
      tags: [decisions]
      summary: Get a decision with all its options, criteria and ratings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Decision detail with options, criteria and ratings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionDetail"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    patch:
      operationId: updateDecision
      tags: [decisions]
      summary: Update a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionUpdate"
      responses:
        "200":
          description: Updated decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteDecision
      tags: [decisions]
      summary: Delete a decision and all its data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /decisions/{id}/options:
    post:
      operationId: addOption
      tags: [options]
      summary: Add an option to a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionInput"
      responses:
        "201":
          description: Created option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Option"
        "401":
          description: Unauthorized
        "404":
          description: Decision not found

  /decisions/{id}/options/{optionId}:
    patch:
      operationId: updateOption
      tags: [options]
      summary: Update an option label
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: optionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionUpdate"
      responses:
        "200":
          description: Updated option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Option"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteOption
      tags: [options]
      summary: Delete an option
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: optionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /decisions/{id}/criteria:
    post:
      operationId: addCriterion
      tags: [criteria]
      summary: Add a criterion to a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriterionInput"
      responses:
        "201":
          description: Created criterion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Criterion"
        "401":
          description: Unauthorized
        "404":
          description: Decision not found

  /decisions/{id}/criteria/{criterionId}:
    patch:
      operationId: updateCriterion
      tags: [criteria]
      summary: Update a criterion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: criterionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriterionUpdate"
      responses:
        "200":
          description: Updated criterion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Criterion"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteCriterion
      tags: [criteria]
      summary: Delete a criterion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: criterionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /decisions/{id}/ratings:
    put:
      operationId: upsertRating
      tags: [ratings]
      summary: Set or update a rating for an option+criterion pair
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingInput"
      responses:
        "200":
          description: Upserted rating
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /decisions/{id}/scores:
    get:
      operationId: getDecisionScores
      tags: [decisions]
      summary: Get weighted scores for all options in a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scores per option
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OptionScore"
        "401":
          description: Unauthorized
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Decision:
      type: object
      required: [id, question, createdAt]
      properties:
        id:
          type: integer
        question:
          type: string
        createdAt:
          type: string

    DecisionInput:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1

    DecisionUpdate:
      type: object
      properties:
        question:
          type: string
          minLength: 1

    Option:
      type: object
      required: [id, decisionId, label, sortOrder]
      properties:
        id:
          type: integer
        decisionId:
          type: integer
        label:
          type: string
        sortOrder:
          type: integer

    OptionInput:
      type: object
      required: [label]
      properties:
        label:
          type: string
          minLength: 1

    OptionUpdate:
      type: object
      properties:
        label:
          type: string
          minLength: 1

    Criterion:
      type: object
      required: [id, decisionId, label, weight, sortOrder]
      properties:
        id:
          type: integer
        decisionId:
          type: integer
        label:
          type: string
        weight:
          type: integer
        sortOrder:
          type: integer

    CriterionInput:
      type: object
      required: [label, weight]
      properties:
        label:
          type: string
          minLength: 1
        weight:
          type: integer
          minimum: 1
          maximum: 5

    CriterionUpdate:
      type: object
      properties:
        label:
          type: string
          minLength: 1
        weight:
          type: integer
          minimum: 1
          maximum: 5

    Rating:
      type: object
      required: [id, optionId, criterionId, score]
      properties:
        id:
          type: integer
        optionId:
          type: integer
        criterionId:
          type: integer
        score:
          type: integer

    RatingInput:
      type: object
      required: [optionId, criterionId, score]
      properties:
        optionId:
          type: integer
        criterionId:
          type: integer
        score:
          type: integer
          minimum: 1
          maximum: 5

    OptionScore:
      type: object
      required: [optionId, label, totalScore, maxScore, percentage]
      properties:
        optionId:
          type: integer
        label:
          type: string
        totalScore:
          type: number
        maxScore:
          type: number
        percentage:
          type: number
        isWinner:
          type: boolean

    DecisionDetail:
      type: object
      required: [id, question, createdAt, options, criteria, ratings]
      properties:
        id:
          type: integer
        question:
          type: string
        createdAt:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/Option"
        criteria:
          type: array
          items:
            $ref: "#/components/schemas/Criterion"
        ratings:
          type: array
          items:
            $ref: "#/components/schemas/Rating"
