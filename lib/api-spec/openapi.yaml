openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for قرار — decision making app
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: decisions
    description: Decision management
  - name: options
    description: Options within a decision
  - name: criteria
    description: Criteria for evaluating options
  - name: ratings
    description: Ratings of options against criteria
  - name: teams
    description: Team workspaces
  - name: comments
    description: Discussion on decisions
  - name: audit
    description: Audit log

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List teams the authenticated user belongs to
      responses:
        "200":
          description: List of teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
        "401":
          description: Unauthorized
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a new team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInput"
      responses:
        "201":
          description: Created team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /teams/join:
    post:
      operationId: joinTeam
      tags: [teams]
      summary: Join a team using an invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinTeamInput"
      responses:
        "200":
          description: Joined team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "404":
          description: Invalid invite code

  /teams/{id}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get team detail with members and decisions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDetail"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /teams/{id}/audit:
    get:
      operationId: getTeamAudit
      tags: [audit]
      summary: Get the audit log for a team
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audit entries, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /decisions:
    get:
      operationId: listDecisions
      tags: [decisions]
      summary: List all decisions for the authenticated user
      responses:
        "200":
          description: List of decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Decision"
        "401":
          description: Unauthorized
    post:
      operationId: createDecision
      tags: [decisions]
      summary: Create a new decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionInput"
      responses:
        "201":
          description: Created decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /decisions/{id}:
    get:
      operationId: getDecision
      tags: [decisions]
      summary: Get a decision with all its options, criteria and ratings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Decision detail with options, criteria and ratings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionDetail"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    patch:
      operationId: updateDecision
      tags: [decisions]
      summary: Update a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionUpdate"
      responses:
        "200":
          description: Updated decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteDecision
      tags: [decisions]
      summary: Move a decision to the recycle bin (soft delete, creator only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Moved to recycle bin
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /decisions/trash:
    get:
      operationId: listTrashedDecisions
      tags: [decisions]
      summary: List the authenticated user's deleted decisions (recycle bin)
      responses:
        "200":
          description: List of deleted decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Decision"
        "401":
          description: Unauthorized

  /decisions/{id}/restore:
    post:
      operationId: restoreDecision
      tags: [decisions]
      summary: Restore a decision from the recycle bin (creator only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Restored decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /decisions/{id}/permanent:
    delete:
      operationId: permanentlyDeleteDecision
      tags: [decisions]
      summary: Permanently delete a trashed decision and all its data (creator only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Permanently deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /decisions/{id}/decide:
    post:
      operationId: decideDecision
      tags: [decisions]
      summary: Mark an option as the final decision (creator only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecideInput"
      responses:
        "200":
          description: Updated decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Decision"
        "401":
          description: Unauthorized
        "403":
          description: Only the creator can decide
        "404":
          description: Not found

  /decisions/{id}/comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments on a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comments, oldest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    post:
      operationId: addComment
      tags: [comments]
      summary: Add a comment to a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /decisions/{id}/audit:
    get:
      operationId: getDecisionAudit
      tags: [audit]
      summary: Get the audit log for a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audit entries, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEntry"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /decisions/{id}/options:
    post:
      operationId: addOption
      tags: [options]
      summary: Add an option to a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionInput"
      responses:
        "201":
          description: Created option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Option"
        "401":
          description: Unauthorized
        "404":
          description: Decision not found

  /decisions/{id}/options/{optionId}:
    patch:
      operationId: updateOption
      tags: [options]
      summary: Update an option label
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: optionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptionUpdate"
      responses:
        "200":
          description: Updated option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Option"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteOption
      tags: [options]
      summary: Delete an option
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: optionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /decisions/{id}/criteria:
    post:
      operationId: addCriterion
      tags: [criteria]
      summary: Add a criterion to a decision
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriterionInput"
      responses:
        "201":
          description: Created criterion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Criterion"
        "401":
          description: Unauthorized
        "404":
          description: Decision not found

  /decisions/{id}/criteria/{criterionId}:
    patch:
      operationId: updateCriterion
      tags: [criteria]
      summary: Update a criterion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: criterionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CriterionUpdate"
      responses:
        "200":
          description: Updated criterion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Criterion"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteCriterion
      tags: [criteria]
      summary: Delete a criterion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: criterionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /decisions/{id}/ratings:
    put:
      operationId: upsertRating
      tags: [ratings]
      summary: Set or update the authenticated user's rating for an option+criterion pair
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingInput"
      responses:
        "200":
          description: Upserted rating
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /decisions/{id}/scores:
    get:
      operationId: getDecisionScores
      tags: [decisions]
      summary: Get weighted scores for all options, aggregated across all voters
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scores per option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionScores"
        "401":
          description: Unauthorized
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Team:
      type: object
      required: [id, name, ownerId, inviteCode, createdAt, memberCount]
      properties:
        id:
          type: integer
        name:
          type: string
        ownerId:
          type: string
        inviteCode:
          type: string
        createdAt:
          type: string
        memberCount:
          type: integer

    TeamInput:
      type: object
      required: [name, memberName]
      properties:
        name:
          type: string
          minLength: 1
        memberName:
          type: string

    JoinTeamInput:
      type: object
      required: [code, memberName]
      properties:
        code:
          type: string
          minLength: 1
        memberName:
          type: string

    TeamMember:
      type: object
      required: [id, teamId, userId, name, role, joinedAt]
      properties:
        id:
          type: integer
        teamId:
          type: integer
        userId:
          type: string
        name:
          type: string
        role:
          type: string
        joinedAt:
          type: string

    TeamDetail:
      type: object
      required: [id, name, ownerId, inviteCode, createdAt, members, decisions]
      properties:
        id:
          type: integer
        name:
          type: string
        ownerId:
          type: string
        inviteCode:
          type: string
        createdAt:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/Decision"

    AuditEntry:
      type: object
      required: [id, userId, actorName, action, detail, createdAt]
      properties:
        id:
          type: integer
        teamId:
          type: integer
        decisionId:
          type: integer
        userId:
          type: string
        actorName:
          type: string
        action:
          type: string
        detail:
          type: string
        createdAt:
          type: string

    Comment:
      type: object
      required: [id, decisionId, userId, authorName, body, createdAt]
      properties:
        id:
          type: integer
        decisionId:
          type: integer
        optionId:
          type: integer
        userId:
          type: string
        authorName:
          type: string
        body:
          type: string
        createdAt:
          type: string

    CommentInput:
      type: object
      required: [body, authorName]
      properties:
        body:
          type: string
          minLength: 1
        authorName:
          type: string
        optionId:
          type: integer

    Decision:
      type: object
      required: [id, question, createdAt, status]
      properties:
        id:
          type: integer
        question:
          type: string
        createdAt:
          type: string
        teamId:
          type: integer
        status:
          type: string
        decidedOptionId:
          type: integer
        decidedAt:
          type: string
        createdByName:
          type: string
        deletedAt:
          type: string
          nullable: true

    DecisionInput:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1
        teamId:
          type: integer
        createdByName:
          type: string

    DecisionUpdate:
      type: object
      properties:
        question:
          type: string
          minLength: 1

    DecideInput:
      type: object
      required: [optionId]
      properties:
        optionId:
          type: integer

    Option:
      type: object
      required: [id, decisionId, label, sortOrder]
      properties:
        id:
          type: integer
        decisionId:
          type: integer
        label:
          type: string
        sortOrder:
          type: integer

    OptionInput:
      type: object
      required: [label]
      properties:
        label:
          type: string
          minLength: 1

    OptionUpdate:
      type: object
      properties:
        label:
          type: string
          minLength: 1

    Criterion:
      type: object
      required: [id, decisionId, label, weight, sortOrder]
      properties:
        id:
          type: integer
        decisionId:
          type: integer
        label:
          type: string
        weight:
          type: integer
        sortOrder:
          type: integer

    CriterionInput:
      type: object
      required: [label, weight]
      properties:
        label:
          type: string
          minLength: 1
        weight:
          type: integer
          minimum: 1
          maximum: 5

    CriterionUpdate:
      type: object
      properties:
        label:
          type: string
          minLength: 1
        weight:
          type: integer
          minimum: 1
          maximum: 5

    Rating:
      type: object
      required: [id, optionId, criterionId, userId, score]
      properties:
        id:
          type: integer
        optionId:
          type: integer
        criterionId:
          type: integer
        userId:
          type: string
        score:
          type: integer

    RatingInput:
      type: object
      required: [optionId, criterionId, score]
      properties:
        optionId:
          type: integer
        criterionId:
          type: integer
        score:
          type: integer
          minimum: 1
          maximum: 5

    OptionScore:
      type: object
      required: [optionId, label, totalScore, maxScore, percentage]
      properties:
        optionId:
          type: integer
        label:
          type: string
        totalScore:
          type: number
        maxScore:
          type: number
        percentage:
          type: number
        isWinner:
          type: boolean

    DecisionScores:
      type: object
      required: [scores, voterCount, myVoteComplete]
      properties:
        scores:
          type: array
          items:
            $ref: "#/components/schemas/OptionScore"
        voterCount:
          type: integer
        myVoteComplete:
          type: boolean

    DecisionDetail:
      type: object
      required: [id, question, createdAt, status, options, criteria, ratings, myRatings]
      properties:
        id:
          type: integer
        question:
          type: string
        createdAt:
          type: string
        teamId:
          type: integer
        status:
          type: string
        decidedOptionId:
          type: integer
        decidedAt:
          type: string
        createdByName:
          type: string
        isCreator:
          type: boolean
        options:
          type: array
          items:
            $ref: "#/components/schemas/Option"
        criteria:
          type: array
          items:
            $ref: "#/components/schemas/Criterion"
        ratings:
          type: array
          items:
            $ref: "#/components/schemas/Rating"
        myRatings:
          type: array
          items:
            $ref: "#/components/schemas/Rating"
